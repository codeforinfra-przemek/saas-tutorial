        target_fields:
          - franchisee_voice.sample_method
          - franchisee_voice.current_interviews
          - franchisee_voice.former_interviews
          - franchisee_voice.common_themes
          - franchisee_voice.corroborated_findings
          - franchisee_voice.unverified_opinions
        evidence:
          min_sources: 3
          preferred_source_types: [franchisee_interview, legal_document]
          acceptance_criteria: >-
            The sampling method, consent, dates and attribution policy are recorded;
            opinions remain separate from facts and recurring claims seek corroboration.
          requires_independent_corroboration: true
          max_age_days: 730
        search_query_templates:
          - '"{brand}" franchisee experience interview'
          - '"{brand}" former franchisee why left'
        dependencies: [fdd20.pipeline_and_references]
        sensitivity: opinion
        jurisdiction: all
        tags: [risk, interviews, sentiment]

      - id: dd.complaints_controversies
        title: "Complaints, investigations, and controversies"
        question: >-
          What recurring complaints, regulator reports, reputable investigations or
          operational controversies exist, and which claims are corroborated versus
          merely alleged or anecdotal?
        fdd_items: [3]
        minimum_depth: risk
        requirement: required
        target_fields:
          - reputation.complaints
          - reputation.regulator_reports
          - reputation.media_investigations
          - reputation.recurring_themes
          - reputation.corroboration_status
          - reputation.responses_and_resolutions
        evidence:
          min_sources: 2
          preferred_source_types: [regulator, court, reputable_media, review_platform, social]
          acceptance_criteria: >-
            Allegations, verified events, company responses and outcomes are separated;
            material negative claims require reliable independent corroboration.
          requires_independent_corroboration: true
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchise complaints controversy investigation'
          - '"{legal_name}" regulator complaint franchisee'
        dependencies: [scope.brand_identity, fdd03.litigation]
        sensitivity: opinion
        jurisdiction: all
        tags: [risk, complaints, media]

      - id: dd.franchisor_business_health
        title: "Franchisor incentives, capacity, and resilience"
        question: >-
          Is the franchisor financially and operationally able to support planned
          growth, and does its economics depend on recurring royalties from healthy
          units or disproportionately on new franchise sales and supplier income?
        fdd_items: [8, 20, 21]
        minimum_depth: risk
        requirement: required
        target_fields:
          - franchisor_health.revenue_mix
          - franchisor_health.royalty_dependency
          - franchisor_health.initial_fee_dependency
          - franchisor_health.supplier_income
          - franchisor_health.support_capacity
          - franchisor_health.growth_plan
          - franchisor_health.distress_scenario
        evidence:
          min_sources: 2
          preferred_source_types: [audited_financial, legal_document, reputable_media]
          acceptance_criteria: >-
            Revenue incentives, liquidity, support staffing and expansion commitments
            are evaluated from statements and operational evidence with limitations.
          requires_independent_corroboration: true
          max_age_days: 365
        search_query_templates:
          - '"{legal_name}" revenue franchise fees royalties financial statements'
          - '"{brand}" franchise support capacity growth plan'
        dependencies: [fdd08.required_suppliers, fdd20.outlet_changes, fdd21.financial_statements]
        sensitivity: financial
        jurisdiction: all
        tags: [risk, franchisor_health]

      - id: dd.local_tax_permits
        title: "Tax, entity, permits, zoning, and employment questions"
        question: >-
          Which entity, tax classification, registrations, permits, zoning, health,
          safety, employment, payroll, sales/VAT and local operating obligations need
          specialist confirmation for the target location and transaction?
        fdd_items: [1, 7, 9]
        minimum_depth: risk
        requirement: required
        target_fields:
          - local_compliance.entity_structure
          - local_compliance.tax_questions
          - local_compliance.permits
          - local_compliance.zoning
          - local_compliance.health_safety
          - local_compliance.employment
          - local_compliance.specialists_required
        evidence:
          min_sources: 2
          preferred_source_types: [government, regulator, legal_document]
          acceptance_criteria: >-
            A location-specific checklist cites current authorities and routes legal,
            tax and accounting conclusions to qualified professionals.
          requires_independent_corroboration: true
          max_age_days: 90
        search_query_templates:
          - 'business permits zoning tax employment franchise {regions}'
          - 'franchise fee tax treatment {country}'
        dependencies: [scope.jurisdictions, fdd07.initial_investment]
        sensitivity: legal
        jurisdiction: all
        tags: [risk, tax, permits]

  - id: unit_level
    title: "Unit-level location intelligence"
    framework: "optional Level 4 research"
    questions:
      - id: unit.location_inventory
        title: "Verified location inventory"
        question: >-
          What is the current list of operating, planned, relocated and closed units,
          with address, coordinates, format, status, source and verification date?
        fdd_items: [20]
        minimum_depth: unit
        requirement: critical
        target_fields:
          - locations.units
          - locations.addresses
          - locations.coordinates
          - locations.formats
          - locations.statuses
          - locations.open_close_dates
          - locations.verification_dates
        evidence:
          min_sources: 2
          preferred_source_types: [official, government, registry]
          acceptance_criteria: >-
            Each location is deduplicated and independently verified with status,
            stable identifier, source, date and uncertainty; completeness is measured.
          requires_independent_corroboration: true
          max_age_days: 90
        search_query_templates:
          - '"{brand}" official store locator {country}'
          - '"{brand}" locations addresses {regions}'
        dependencies: [scope.brand_identity, fdd20.outlet_changes]
        sensitivity: public_business
        jurisdiction: all
        tags: [unit, locations, critical]

      - id: unit.review_signals
        title: "Location-level review signals"
        question: >-
          Using authorized APIs or manual review, what rating count, rating trend,
          dated recurring themes and response patterns exist per verified location?
        fdd_items: []
        minimum_depth: unit
        requirement: recommended
        target_fields:
          - location_reviews.provider
          - location_reviews.place_identifier
          - location_reviews.rating
          - location_reviews.review_count
          - location_reviews.theme_summary
          - location_reviews.observed_at
        evidence:
          min_sources: 1
          preferred_source_types: [review_platform]
          acceptance_criteria: >-
            Metrics come from an authorized method, map to a verified location and
            date, avoid bulk copying review text, and remain labeled as sentiment.
          requires_independent_corroboration: false
          max_age_days: 90
        search_query_templates:
          - '"{brand}" reviews {regions}'
        dependencies: [unit.location_inventory]
        sensitivity: opinion
        jurisdiction: all
        tags: [unit, reviews, sentiment]

      - id: unit.operator_public_data
        title: "Necessary public operator information"
        question: >-
          Where legally justified, which public business entity operates each unit,
          what is the evidence, and can the research goal be met without collecting
          names or private contact details of natural persons?
        fdd_items: [20]
        minimum_depth: unit
        requirement: optional
        target_fields:
          - location_operators.business_entity
          - location_operators.public_registry_reference
          - location_operators.role
          - location_operators.legal_basis_and_necessity
          - location_operators.verified_at
        evidence:
          min_sources: 2
          preferred_source_types: [registry, government, official]
          acceptance_criteria: >-
            Only necessary public business data with documented purpose and legal
            basis is retained; private natural-person data is excluded by default.
          requires_independent_corroboration: true
          max_age_days: 180
        search_query_templates:
          - '"{brand}" operator company registry {regions}'
        dependencies: [unit.location_inventory]
        sensitivity: personal_data
        jurisdiction: all
        tags: [unit, operator, privacy]

  - id: data_quality
    title: "Evidence, freshness, conflicts, and completion"
    framework: "internal audit standard"
    questions:
      - id: quality.source_metadata
        title: "Source and evidence metadata"
        question: >-
          Does every planned fact require source URL/file, publisher, source type,
          publication/effective date, collection date, precise excerpt/location,
          jurisdiction, reliability and claim confidence?
        fdd_items: []
        minimum_depth: catalog
        requirement: critical
        target_fields:
          - quality.source_metadata_complete
          - quality.evidence_locations
          - quality.source_reliability
          - quality.claim_confidence
        evidence:
          min_sources: 1
          preferred_source_types: [government, regulator, legal_document, official]
          acceptance_criteria: >-
            The storage contract rejects factual claims without retrievable evidence,
            dates and separate source-reliability and claim-confidence values.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - 'evidence metadata checklist for "{brand}" research'
        dependencies: []
        sensitivity: public_business
        jurisdiction: all
        tags: [quality, provenance, critical]

      - id: quality.conflicts_and_statuses
        title: "Missing and conflicting data protocol"
        question: >-
          How will the run distinguish not_applicable, not_disclosed, not_found and
          conflicting values, preserve competing claims, and generate targeted
          follow-up tasks instead of guessing?
        fdd_items: []
        minimum_depth: catalog
        requirement: critical
        target_fields:
          - quality.missing_statuses
          - quality.conflict_records
          - quality.follow_up_policy
          - quality.no_guessing_rule
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            Status values are explicit, conflicts retain all evidence, and unresolved
            critical fields create follow-ups while still respecting round limits.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - 'conflicting sources checklist "{brand}"'
        dependencies: [quality.source_metadata]
        sensitivity: public_business
        jurisdiction: all
        tags: [quality, conflicts, critical]

      - id: quality.completion_and_human_gate
        title: "Completion, stopping, and human-review gate"
        question: >-
          What critical fields, evidence thresholds, freshness rules and contradiction
          limits define completion, and what prevents automatic publication or import?
        fdd_items: []
        minimum_depth: catalog
        requirement: critical
        target_fields:
          - quality.critical_fields
          - quality.scoring_rules
          - quality.freshness_rules
          - quality.stop_conditions
          - quality.human_review_gate
          - quality.import_approval
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            A run stops only at threshold with no critical gaps or at max rounds,
            and all outputs remain staging artifacts until documented human approval.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - 'quality completion checklist "{brand}" research plan'
        dependencies: [quality.source_metadata, quality.conflicts_and_statuses]
        sensitivity: public_business
        jurisdiction: all
        tags: [quality, stopping, human_review, critical]
