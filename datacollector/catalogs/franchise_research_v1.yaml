  - id: us_process
    title: "United States federal and state process controls"
    framework: "16 CFR Part 436 plus applicable state law"
    questions:
      - id: us.definition_and_exemptions
        title: "Federal definition and claimed exemptions"
        question: >-
          Does the relationship meet the current federal franchise elements, could
          another business-opportunity rule apply, and is any current exemption
          claimed with documented facts and counsel review?
        fdd_items: [1]
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - us_rule.franchise_elements
          - us_rule.business_opportunity_check
          - us_rule.claimed_exemptions
          - us_rule.exemption_evidence
          - us_rule.counsel_review_status
        evidence:
          min_sources: 2
          preferred_source_types: [regulator, government, legal_document]
          acceptance_criteria: >-
            Facts are mapped to the current rule text; thresholds are read live from
            eCFR and any legal conclusion remains assigned to qualified counsel.
          requires_independent_corroboration: true
          max_age_days: 30
        search_query_templates:
          - 'site:ecfr.gov 16 CFR 436 franchise definition exemptions current'
          - 'site:ftc.gov Franchise Rule exemptions current'
        dependencies: [scope.jurisdictions, scope.offer_and_transaction]
        sensitivity: legal
        jurisdiction: us_only
        tags: [us, federal, applicability]

      - id: us.delivery_and_updates
        title: "Federal delivery, timing, update, and retention controls"
        question: >-
          Were current federal timing rules for FDD delivery, material contract
          changes, annual and quarterly updates, plain-language format, receipts,
          retention and seller conduct satisfied?
        fdd_items: [23]
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - us_process.fdd_delivered_at
          - us_process.binding_agreement_signed_at
          - us_process.payment_made_at
          - us_process.initial_review_days
          - us_process.fdd_delivery_timing
          - us_process.proposed_agreement_delivered_at
          - us_process.unilateral_material_change
          - us_process.change_initiated_by_prospect
          - us_process.final_agreement_signed_at
          - us_process.revised_agreement_review_days
          - us_process.contract_change_timing
          - us_process.annual_update
          - us_process.quarterly_updates
          - us_process.format_and_plain_english
          - us_process.receipt_retention
          - us_process.materially_different_disclosure_versions
          - us_process.disclosure_version_last_used_fiscal_year
          - us_process.disclosure_version_retention_3y
          - us_process.seller_conduct
        evidence:
          min_sources: 2
          preferred_source_types: [regulator, legal_document]
          acceptance_criteria: >-
            Source timestamps permit independent calculation of the initial and
            revised-agreement review periods. Receipt retention and retention of every
            materially different disclosure version for three years after the close
            of the fiscal year when last used are tested separately. Each control is
            checked against current rule text; materiality, prospect-initiated changes,
            deviations and unresolved legal questions are separately flagged.
          requires_independent_corroboration: true
          max_age_days: 30
        search_query_templates:
          - 'site:ecfr.gov 16 CFR 436 disclosure 14 days 7 days updates receipts'
          - 'site:ftc.gov Franchise Rule compliance guide delivery update retention'
        dependencies: [us.definition_and_exemptions, fdd23.receipt_and_sellers]
        sensitivity: legal
        jurisdiction: us_only
        tags: [us, federal, process]

      - id: us.state_overlay
        title: "State registration, disclosure, and relationship-law overlay"
