version: "1.0.0"
title: "Franchise Research Standard: FTC FDD baseline plus independent due diligence"
legal_note: >-
  The FTC Franchise Rule applies to covered offers or sales of franchises located
  in the United States and its territories. For research in Poland or another
  country, the 23 FDD Items are a comparative data standard, not a statement of
  local legal compliance. Legal conclusions require current local counsel.
authoritative_sources:
  - "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-D/part-436"
  - "https://www.ftc.gov/legal-library/browse/rules/franchise-rule"
  - "https://www.ftc.gov/business-guidance/resources/franchise-rule-compliance-guide"
  - "https://www.ftc.gov/business-guidance/resources/consumers-guide-buying-franchise"
  - "https://www.sba.gov/business-guide/plan-your-business/buy-existing-business-or-franchise"
  - "https://www.sba.gov/document/support-sba-franchise-directory"
source_policy:
  preferred_order:
    - government
    - regulator
    - court
    - registry
    - legal_document
    - audited_financial
    - official
    - reputable_media
    - industry
    - franchisee_interview
    - review_platform
    - social
  rules:
    - "Every factual claim must link to a retrievable source and record collection date."
    - "Store a short supporting excerpt or precise document location for every fact."
    - "Separate what a company declares from independently corroborated truth."
    - "Represent unavailable data as not_applicable, not_disclosed, not_found, or conflicting; never guess."
    - "Record source publication/effective date, jurisdiction, reliability, and claim confidence separately."
    - "Treat reviews, interviews, blogs, and social media as attributed opinion unless independently corroborated."
    - "For changing facts, prefer the newest primary source and preserve superseded values as history."
  prohibited_methods:
    - "accessing private, login-protected, or paywalled material without authorization"
    - "scraping Google Reviews instead of using an authorized API or manual review"
    - "collecting unnecessary private contact details or sensitive personal data"
    - "publishing allegations as facts without reliable corroboration and human review"

sections:
  - id: scope
    title: "Scope, identity, and applicability"
    framework: "research foundation"
    questions:
      - id: scope.brand_identity
        title: "Brand and legal entity identity"
        question: >-
          What exact brand, legal franchisor, trading names, parent entities, and
          official franchise website are in scope for the target market?
        fdd_items: [1]
        minimum_depth: catalog
        requirement: critical
        target_fields:
          - brand.name
          - brand.aliases
          - franchisor.legal_name
          - franchisor.registration_id
          - franchisor.parent_entities
          - websites.official
          - websites.franchise_offer
        evidence:
          min_sources: 2
          preferred_source_types: [registry, official, government]
          acceptance_criteria: >-
            The brand is tied to a specific legal offering entity in the target
            market, with registry or equivalent primary evidence and official URLs.
          requires_independent_corroboration: true
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchise official {country}'
          - '"{brand}" "{legal_name}" company registry {country}'
        dependencies: []
        sensitivity: public_business
        jurisdiction: all
        tags: [identity, critical]

      - id: scope.offer_and_transaction
        title: "Offer and transaction type"
        question: >-
          Is the opportunity a new single-unit franchise, multi-unit or area
          development deal, master/subfranchise, renewal, transfer, or resale?
        fdd_items: [1, 17, 20]
        minimum_depth: catalog
        requirement: required
        target_fields:
          - offer.type
          - offer.unit_formats
          - offer.new_or_resale
          - offer.target_investor
        evidence:
          min_sources: 1
          preferred_source_types: [official, legal_document]
          acceptance_criteria: >-
            The transaction and unit format are explicit, with ambiguity recorded
            rather than silently combining materially different offers.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchise offer formats {country}'
          - '"{brand}" area development master franchise {country}'
        dependencies: [scope.brand_identity]
        sensitivity: public_business
        jurisdiction: all
        tags: [scope]

      - id: scope.jurisdictions
        title: "Potentially applicable jurisdictions"
        question: >-
          Which country, state, province, and local rules may apply based on the
          parties, outlet, offer, acceptance, payment, and signing locations?
        fdd_items: [1]
        minimum_depth: catalog
        requirement: critical
        target_fields:
          - jurisdictions.target_country
          - jurisdictions.target_regions
          - jurisdictions.offer_locations
          - jurisdictions.local_rules_to_verify
        evidence:
          min_sources: 1
          preferred_source_types: [government, regulator, legal_document]
          acceptance_criteria: >-
            All plausible jurisdictions and the factual trigger for each are
            listed; legal applicability is flagged for professional confirmation.
          requires_independent_corroboration: false
          max_age_days: 90
        search_query_templates:
          - 'franchise law regulator {regions}'
          - 'franchise disclosure registration requirements {regions}'
        dependencies: [scope.brand_identity, scope.offer_and_transaction]
        sensitivity: legal
        jurisdiction: all
        tags: [jurisdiction, critical]

      - id: scope.document_inventory
        title: "Current document inventory"
        question: >-
          What disclosure documents, agreements, addenda, manuals, fee schedules,
          brochures, financial statements, and dated versions are available?
        fdd_items: [21, 22, 23]
        minimum_depth: catalog
        requirement: critical
        target_fields:
          - documents.inventory
          - documents.versions
          - documents.issue_dates
          - documents.effective_dates
          - documents.missing
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official, regulator]
          acceptance_criteria: >-
            Every located document has title, issuer, date, version, URL or file
            reference, and checksum where downloaded; missing documents are explicit.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchise agreement disclosure PDF {country}'
          - '"{brand}" franchise document agreement {country}'
        dependencies: [scope.brand_identity]
        sensitivity: legal
        jurisdiction: all
        tags: [documents, provenance, critical]

      - id: scope.local_legal_overlay
        title: "Target-country franchise and business-law overlay"
        question: >-
          In the target country and regions, which current franchise, pre-contract
          disclosure, commercial agency, competition, unfair-practices, privacy,
          registration and relationship rules must be researched separately from FDD?
        fdd_items: []
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - local_law.franchise_definition
          - local_law.precontract_disclosure
          - local_law.registration_and_filings
          - local_law.relationship_rules
          - local_law.competition_and_unfair_practices
          - local_law.privacy_and_personal_data
          - local_law.counsel_questions
        evidence:
          min_sources: 2
          preferred_source_types: [government, regulator, legal_document]
          acceptance_criteria: >-
            Current primary authorities are mapped to each target jurisdiction and
            unresolved interpretation is assigned to qualified local counsel; the
            U.S. FDD benchmark is never presented as local law.
          requires_independent_corroboration: true
          max_age_days: 90
        search_query_templates:
          - 'franchise disclosure relationship law {country} {regions}'
          - 'franchise competition privacy regulator {country}'
        dependencies: [scope.jurisdictions]
        sensitivity: legal
        jurisdiction: all
        tags: [jurisdiction, local_law, critical]

  - id: fdd_01_04_background_risk
    title: "FDD Items 1-4: background, management, litigation, bankruptcy"
    framework: "16 CFR 436.5(a-d)"
    questions:
      - id: fdd01.business_background
        title: "Franchisor and system background"
        question: >-
          What is the franchisor's structure, history, predecessors and affiliates,
          franchise experience, business model, market, seasonality, competition,
          and industry-specific regulation?
        fdd_items: [1]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - franchisor.structure
          - franchisor.principal_address
          - franchisor.entity_type
          - franchisor.formation_jurisdiction
          - franchisor.service_agent
          - franchisor.predecessors_10y
          - franchisor.affiliates
          - franchisor.operating_history
          - franchisor.franchising_history
          - business.model
          - market.summary
          - market.seasonality
          - market.competition
          - market.industry_regulation
        evidence:
          min_sources: 2
          preferred_source_types: [legal_document, registry, official, government]
          acceptance_criteria: >-
            The legal and commercial history is dated, market-specific, and
            distinguishes the franchisor from parents, affiliates, and the brand.
          requires_independent_corroboration: true
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchisor history affiliates {country}'
          - '"{legal_name}" annual report business history'
        dependencies: [scope.brand_identity]
        sensitivity: public_business
        jurisdiction: all
        tags: [fdd, background]

      - id: fdd02.management_experience
        title: "Management experience"
        question: >-
          Who are the directors, trustees, general partners, principal officers and
          other people with management responsibility for franchise sales or
          operations, and what is each person's current position and complete
          five-year employment history, including positions, employers, locations
          and start/end dates?
        fdd_items: [2]
        minimum_depth: due_diligence
        requirement: recommended
        target_fields:
          - management.people
          - management.roles
          - management.experience
          - management.tenure
          - management.covered_people_and_responsibility
          - management.current_position
          - management.five_year_employment_history
          - management.employment_start_end_dates
          - management.position_and_employer
          - management.position_location
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official, registry]
          acceptance_criteria: >-
            Every covered person has a current role and complete, gap-flagged
            five-year history with start/end dates, position, employer and location;
            only professional information needed to evaluate the system is retained.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchise management team {country}'
          - '"{legal_name}" directors officers'
        dependencies: [scope.brand_identity]
        sensitivity: public_business
        jurisdiction: all
        tags: [fdd, management]

      - id: fdd03.litigation
        title: "Material litigation and enforcement"
        question: >-
          For every covered franchisor entity, affiliate and manager, what reportable
          pending actions, last-fiscal-year franchise-relationship cases, felony
          convictions or nolo pleas, injunctions or restrictive orders, and historical
          franchise, fraud, antitrust, securities or deceptive-practices matters exist,
          including cases brought by the franchisor against franchisees?
        fdd_items: [3]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - legal.litigation_covered_subjects
          - legal.pending_actions
          - legal.franchise_relationship_actions_last_fiscal_year
          - legal.felony_convictions_and_nolo_pleas_10y
          - legal.currently_effective_injunctions_and_restrictive_orders
          - legal.litigation
          - legal.regulatory_actions
          - legal.franchisor_vs_franchisee_cases
          - legal.case_forum_number_parties_dates
          - legal.claims_relief_damages_and_settlements
          - legal.case_status
          - legal.outcomes
        evidence:
          min_sources: 2
          preferred_source_types: [court, regulator, legal_document]
          acceptance_criteria: >-
            All required subject classes and applicable lookback periods are tested;
            currently effective injunctions/restrictive orders are checked regardless
            of issuance date. Each matter has parties, forum, number, dates, claims,
            requested relief, status, damages/settlement, outcome and source;
            no-result findings record scope.
          requires_independent_corroboration: true
          max_age_days: 90
        search_query_templates:
          - '"{legal_name}" franchise lawsuit court'
          - '"{brand}" regulator enforcement franchise {country}'
          - '"{brand}" FDD Item 3 litigation'
        dependencies: [scope.brand_identity]
        sensitivity: legal
        jurisdiction: all
        tags: [fdd, legal, risk]

      - id: fdd04.bankruptcy
        title: "Bankruptcy and financial distress history"
        question: >-
          During the required ten-year period, have the franchisor, parent,
          predecessors, affiliates, officers, general partners or other people with
          franchise-management responsibility been involved in a covered bankruptcy;
          and was any such person a principal officer or general partner of another
          entity that entered bankruptcy while they held the role or within one year
          afterward?
        fdd_items: [4]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - legal.bankruptcies
          - legal.insolvency_proceedings
          - legal.distress_period_checked
          - legal.bankruptcy_covered_entities_and_people
          - legal.bankruptcy_10y_period_checked
          - legal.franchisor_parent_predecessor_affiliate_bankruptcies
          - legal.officer_general_partner_management_person_bankruptcies
          - legal.principal_officer_or_general_partner_other_entity_bankruptcy
          - legal.other_entity_role_and_one_year_timing
          - legal.bankruptcy_case_details_and_outcomes
        evidence:
          min_sources: 2
          preferred_source_types: [court, registry, legal_document]
          acceptance_criteria: >-
            The full covered entity/person set and ten-year period are tested,
            including the other-entity principal-officer/general-partner rule and its
            one-year timing. Each proceeding has role, court, number, dates, legal
            basis and outcome; a no-result finding records the exact search scope.
          requires_independent_corroboration: true
          max_age_days: 180
        search_query_templates:
          - '"{legal_name}" bankruptcy insolvency court'
          - '"{brand}" FDD Item 4 bankruptcy'
        dependencies: [scope.brand_identity]
        sensitivity: legal
        jurisdiction: all
        tags: [fdd, insolvency, risk]

  - id: fdd_05_10_money_obligations
    title: "FDD Items 5-10: fees, investment, suppliers, obligations, financing"
    framework: "16 CFR 436.5(e-j)"
    questions:
      - id: fdd05.initial_fees
        title: "Initial fees"
        question: >-
          What payments are due to the franchisor or affiliates before opening,
          how are they calculated and paid, are they uniform, and when refundable?
        fdd_items: [5]
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - fees.initial
          - fees.initial_formula
          - fees.initial_due_date
          - fees.initial_refundability
          - fees.initial_variation
          - fees.initial_currency
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            Every pre-opening fee has amount or formula, currency, payee, due date,
            refund conditions, tax treatment note, and document section reference.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" initial franchise fee {country}'
          - '"{brand}" FDD Item 5 fee'
        dependencies: [scope.document_inventory]
        sensitivity: financial
        jurisdiction: all
        tags: [fdd, fees, critical]

      - id: fdd06.other_fees
        title: "Ongoing and event-driven fees"
        question: >-
          What royalty, advertising, technology, training, audit, renewal, transfer,
          remodeling, default, interest, indemnity, and other fees can be charged?
        fdd_items: [6]
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - fees.royalty
          - fees.marketing
          - fees.technology
          - fees.training
          - fees.audit
          - fees.renewal
          - fees.transfer
          - fees.remodeling
          - fees.default_and_penalties
          - fees.other
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            Each fee has amount/formula, calculation base, currency, frequency,
            payee, adjustment rights, trigger, refundability, and contract reference.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" royalty marketing technology fees franchise {country}'
          - '"{brand}" FDD Item 6 other fees'
        dependencies: [scope.document_inventory]
        sensitivity: financial
        jurisdiction: all
        tags: [fdd, fees, critical]

      - id: fdd07.initial_investment
        title: "Estimated initial investment"
        question: >-
          What low/high investment is required for fees, property, build-out,
          equipment, IT, inventory, deposits, permits, insurance, opening promotion,
          training/travel, and initial working capital?
        fdd_items: [7]
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - investment.total_low
          - investment.total_high
          - investment.currency
          - investment.line_items
          - investment.working_capital_period
          - investment.estimation_basis
          - investment.payment_and_refund_terms
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            A non-overlapping line-item range reconciles to the total and records
            currency, date, payee, payment method, refundability and estimation basis.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" total initial investment franchise {country}'
          - '"{brand}" FDD Item 7 estimated initial investment'
        dependencies: [fdd05.initial_fees, scope.offer_and_transaction]
        sensitivity: financial
        jurisdiction: all
        tags: [fdd, investment, critical]

      - id: fdd08.required_suppliers
        title: "Required purchases and supplier economics"
        question: >-
          Which goods, services, real estate, equipment, software, and inventory
          must be bought or leased from designated or approved suppliers, and what
          financial interests, rebates, approval rules, or purchasing benefits exist?
        fdd_items: [8]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - suppliers.required_items
          - suppliers.approved_and_exclusive
          - suppliers.approval_process
          - suppliers.affiliated_interests
          - suppliers.rebates_and_revenue
          - suppliers.purchase_share
          - suppliers.cooperatives
          - suppliers.material_benefits
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            Obligations, supplier choice, approval/revocation rules, affiliate
            interests and franchisor consideration are tied to contract sections.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" required suppliers franchise'
          - '"{brand}" FDD Item 8 suppliers rebates'
        dependencies: [scope.document_inventory]
        sensitivity: financial
        jurisdiction: all
        tags: [fdd, suppliers, hidden_costs]

      - id: fdd09.franchisee_obligations
        title: "Franchisee obligation matrix"
        question: >-
          What obligations govern site selection, development, training, opening,
          operations, standards, purchasing, staffing, insurance, records, reports,
          audits, targets, remodeling, transfer, renewal and post-termination conduct?
        fdd_items: [9]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - obligations.matrix
          - obligations.contract_cross_references
          - obligations.performance_targets
          - obligations.post_termination
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document]
          acceptance_criteria: >-
            Each material obligation has responsible party, timing, condition,
            consequence of breach, and exact agreement section reference.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchisee obligations agreement'
          - '"{brand}" FDD Item 9 obligations'
        dependencies: [scope.document_inventory]
        sensitivity: legal
        jurisdiction: all
        tags: [fdd, contract]

      - id: fdd10.financing
        title: "Financing terms"
        question: >-
          Does the franchisor or an affiliate offer or arrange financing, and what
          are the amount, rate, fees, term, collateral, guarantees, defaults,
          prepayment rights, assignment and referral compensation?
        fdd_items: [10]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - financing.available
          - financing.provider
          - financing.amount_and_down_payment
          - financing.rate_fees_term
          - financing.security_and_guarantees
          - financing.default_and_prepaid_terms
          - financing.referral_compensation
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            Every financing arrangement and material term is recorded, including
            affiliations and consequences of default; unavailable terms are explicit.
          requires_independent_corroboration: false
          max_age_days: 180
        search_query_templates:
          - '"{brand}" franchise financing terms {country}'
          - '"{brand}" FDD Item 10 financing'
        dependencies: [fdd07.initial_investment]
        sensitivity: financial
        jurisdiction: all
        tags: [fdd, financing]

  - id: fdd_11_16_operations_ip
    title: "FDD Items 11-16: assistance, territory, IP, participation, sales"
    framework: "16 CFR 436.5(k-p)"
    questions:
      - id: fdd11.assistance_and_opening
        title: "Pre-opening and ongoing assistance"
        question: >-
          What assistance is contractually required for site selection, permits,
          construction, equipment, hiring, opening and ongoing operations, and how
          long does opening usually take?
        fdd_items: [11]
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - support.pre_opening
          - support.site_selection
          - support.buildout_and_permits
          - support.hiring_and_opening
          - support.ongoing
          - support.estimated_opening_time
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            Promised assistance is separated from optional practice and mapped to
            provider, timing, conditions, costs, limitations and contract sections.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchise training support site selection {country}'
          - '"{brand}" FDD Item 11 assistance'
        dependencies: [scope.document_inventory]
        sensitivity: public_business
        jurisdiction: all
        tags: [fdd, support, critical]

      - id: fdd11.advertising_it_training
        title: "Advertising, systems, manuals, and training"
        question: >-
          How are advertising funds governed and spent; which IT systems and data
          access are mandatory; what does the operations manual cover; and what are
          the training subjects, hours, instructors, participants, costs and pass rules?
        fdd_items: [11]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - support.advertising_program
          - support.ad_fund_governance
          - support.it_systems
          - support.it_data_access
          - support.manual_outline
          - support.training_program
          - support.training_costs
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official, audited_financial]
          acceptance_criteria: >-
            Advertising, IT, manual and training obligations have current scope,
            costs, controls, audit status and agreement or disclosure references.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" franchise advertising fund training IT system'
          - '"{brand}" FDD Item 11 training program'
        dependencies: [fdd11.assistance_and_opening]
        sensitivity: financial
        jurisdiction: all
        tags: [fdd, training, advertising, technology]

      - id: fdd12.territory
        title: "Territory and channel conflict"
        question: >-
          Is a location or minimum/exclusive territory granted; what performance
          conditions, relocation and expansion rights apply; and may the franchisor,
          affiliates, internet channels or competing brands sell into it?
        fdd_items: [12]
        minimum_depth: due_diligence
        requirement: critical
        target_fields:
          - territory.location_rule
          - territory.minimum_area
          - territory.exclusivity
          - territory.performance_conditions
          - territory.relocation_and_expansion
          - territory.other_channels
          - territory.competing_brands
          - territory.conflict_resolution
        evidence:
          min_sources: 1
          preferred_source_types: [legal_document, official]
          acceptance_criteria: >-
            Rights and exceptions are described from the agreement, including
            channels, compensation, modification triggers and loss of exclusivity.
          requires_independent_corroboration: false
          max_age_days: 365
        search_query_templates:
          - '"{brand}" exclusive protected territory franchise {country}'
          - '"{brand}" FDD Item 12 territory internet sales'
        dependencies: [scope.document_inventory]
        sensitivity: legal
        jurisdiction: all
        tags: [fdd, territory, critical]

      - id: fdd13.trademarks
        title: "Trademark rights and disputes"
        question: >-
          Which principal marks are licensed, who owns them, are they registered or
          pending, what limitations or disputes exist, and who must defend or pay if
          the mark is challenged or changed?
        fdd_items: [13]
        minimum_depth: due_diligence
        requirement: required
        target_fields:
          - ip.trademarks
          - ip.trademark_owner
          - ip.trademark_registrations
          - ip.trademark_limitations
          - ip.trademark_disputes
          - ip.trademark_defense_and_change
        evidence:
          min_sources: 2
          preferred_source_types: [government, registry, legal_document]
          acceptance_criteria: >-
            Principal marks are matched to current registry records and agreement
            rights, with disputes, prior users, defense and change costs recorded.
          requires_independent_corroboration: true
          max_age_days: 180
        search_query_templates:
          - '"{brand}" trademark registry {country}'
          - '"{brand}" FDD Item 13 trademark'
        dependencies: [scope.brand_identity]
        sensitivity: legal
        jurisdiction: all
        tags: [fdd, intellectual_property]

      - id: fdd14.other_ip
        title: "Patents, copyrights, software, and trade secrets"
        question: >-
          What material patents, copyrights, software, know-how and trade secrets
