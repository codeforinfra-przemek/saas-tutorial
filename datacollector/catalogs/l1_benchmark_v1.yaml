version: "1.0.0"
profile_id: "PL:L1:v2"
title: "PL:L1 pilot — researcher + ChatGPT versus auditable pipeline"

pilot_gates:
  all_tasks_attempted: true
  proposed_fields_min: 8
  proposed_fields_target: 12
  accepted_unchanged_rate_min: 0.60
  review_minutes_max: 15
  accepted_fields_per_usd_min: 10
  unmarked_demo_values_max: 0
  public_numeric_metadata_rate_min: 1.0

brands:
  - {slug: zabka, name: "Żabka", category: "convenience retail", source_availability: high, rationale: "Duża sieć i wiele źródeł, ale złożony model operatorski."}
  - {slug: mcdonalds, name: "McDonald's", category: "QSR", source_availability: high, rationale: "Rozpoznawalna marka i wysoki próg inwestycji."}
  - {slug: bafra-kebab, name: "Bafra Kebab", category: "gastronomy", source_availability: medium, rationale: "Oferta obecna w źródłach oficjalnych i katalogowych."}
  - {slug: bobby-burger, name: "Bobby Burger", category: "gastronomy", source_availability: low, rationale: "Przypadek kalibracyjny dla aktywnych, lecz niedatowanych stron."}
  - {slug: carrefour-express, name: "Carrefour Express", category: "grocery retail", source_availability: medium, rationale: "Duża marka, kilka formatów i trudniejsze pobieranie części stron."}
  - {slug: chorten, name: "Chorten", category: "grocery retail", source_availability: medium, rationale: "Rozproszona sieć i niejednorodne dane o ofercie."}
  - {slug: da-grasso, name: "Da Grasso", category: "gastronomy", source_availability: medium, rationale: "Oferta gastronomiczna z publicznymi parametrami wejścia."}
  - {slug: xtreme-fitness-gyms, name: "Xtreme Fitness Gyms", category: "fitness", source_availability: medium, rationale: "Inna kategoria, format lokalu i ekonomika niż retail/QSR."}
  - {slug: subway, name: "Subway", category: "QSR", source_availability: medium, rationale: "Marka globalna wymagająca rozdzielenia danych PL od globalnych."}
  - {slug: north-fish, name: "North Fish", category: "QSR", source_availability: low, rationale: "Kontrola zachowania pipeline'u przy ograniczonej publicznej ofercie."}

