  - profile_id: "PL:L3:v1"
    aliases: ["PL:L3"]
    country: "PL"
    level: "L3"
    name: "Polska — publiczne due diligence zgodne z benchmarkiem FDD"
    description: >-
      Pełny publiczny research pytań inspirowanych FDD z jawnym rozróżnieniem
      danych oczekiwanych publicznie, rejestrowych, ręcznych i wymagających
      uprawnionego dostępu do prywatnego dokumentu.
    intended_use: >-
      Pogłębiony research wybranych marek i udokumentowanie zarówno zdobytych
      danych, jak i granic publicznej dostępności bez nieskończonych pętli search.
