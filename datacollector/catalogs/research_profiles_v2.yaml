version: "2.1.0"
title: "Country-calibrated franchise research profiles"
question_catalog_version: "1.0.0"

profiles:
  - profile_id: "PL:L1:v2"
    aliases: ["PL:L1"]
    country: "PL"
    level: "L1"
    name: "Polska — rdzeń decyzyjny katalogu"
    description: >-
      Dwadzieścia publicznych pól, które użytkownik wykorzystuje do pierwszego
      porównania marki, kosztów, wymagań, wsparcia i skali sieci.
    intended_use: >-
      Tanie masowe nasycenie katalogu pełnym, uczciwie oznaczonym L1 oraz
      benchmark researcher plus ChatGPT kontra audytowalny pipeline.
    access_scope: public
    legacy_depth: due_diligence
    default_availability: public_optional
    country_authoritative_sources:
      - "https://biznes.gov.pl/"
    completion_required_availabilities: [public_expected]
    question_rules:
      - question_id: scope.brand_identity
        requirement: critical
        title: "Tożsamość marki i oficjalna oferta"
        question: >-
          Jaka jest nazwa, kategoria i zwięzły model marki oraz które strony i
          ogólny kanał kontaktu są oficjalne dla aktualnej oferty franczyzowej?
        search_query_templates:
          - '"{brand}" franczyza oficjalna strona'
          - '"{brand}" oficjalna oferta franczyzowa kontakt'
        fields:
          brand.name: public_expected
          brand.category: public_expected
          brand.public_summary: public_optional
          websites.official: public_expected
          websites.franchise_offer: public_expected
          contact.generic_business_route: public_expected
        min_sources: 1
        preferred_source_types: [official, industry, marketplace]
        acceptance_criteria: >-
          Nazwa i kanały muszą być powiązane z aktywną marką. Statyczna aktywna
          strona nie jest odrzucana wyłącznie dlatego, że nie ma daty publikacji;
          zapisuje się datę pobrania i typ źródła.
        requires_independent_corroboration: false
        clear_max_age_days: true
        dependencies: []

      - question_id: scope.offer_and_transaction
        requirement: critical
        title: "Format współpracy i próg wejścia kandydata"
        question: >-
          Czy oferta dotyczy pojedynczej jednostki, wielu jednostek, master
          franczyzy, transferu lub odsprzedaży oraz jakie kapitałowe i lokalowe
          wymagania kandydata są publicznie deklarowane?
        search_query_templates:
          - '"{brand}" franczyza pojedyncza multiunit master odsprzedaż'
          - '"{brand}" franczyza wymagania kandydat lokal'
        fields:
          offer.unit_formats: public_expected
          candidate.capital_requirement: public_expected
          candidate.premises_requirements: public_expected
        min_sources: 1
        preferred_source_types: [official, industry, marketplace]
        acceptance_criteria: >-
          Każda wartość zachowuje format transakcji i zakres oferty; wymagany
          kapitał nie jest mylony z całkowitą inwestycją ani opłatą wejściową.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity]

      - question_id: fdd05.initial_fees
        requirement: critical
        title: "Opłata wejściowa"
        question: >-
          Jaka opłata za przystąpienie jest obecnie publicznie deklarowana?
        search_query_templates:
          - '"{brand}" franczyza opłata wstępna wpisowa'
          - '"{brand}" franczyza opłata za przystąpienie'
        fields:
          fees.joining_fee: public_expected
        min_sources: 1
        preferred_source_types: [official, legal_document, industry]
        acceptance_criteria: >-
          Kwota zachowuje walutę, netto lub brutto, format oferty, datę ważności
          podaną przez autora albo co najmniej datę pobrania źródła.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity, scope.offer_and_transaction]

      - question_id: fdd06.other_fees
        requirement: required
        title: "Opłaty bieżące"
        question: >-
          Jakie opłaty royalty i marketingowe są obecnie publicznie podawane?
        search_query_templates:
          - '"{brand}" franczyza royalty opłata marketingowa'
          - '"{brand}" franczyza opłaty miesięczne bieżące'
        fields:
          fees.royalty: public_optional
          fees.marketing: public_optional
        min_sources: 1
        preferred_source_types: [official, legal_document, industry]
        acceptance_criteria: >-
          Kwota lub procent zachowują podstawę naliczenia, częstotliwość, format
          oferty i datę podaną przez autora albo datę pobrania.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity, scope.offer_and_transaction]

      - question_id: fdd07.initial_investment
        requirement: critical
        title: "Inwestycja i wkład własny"
        question: >-
          Jaki jest aktualnie deklarowany zakres całkowitej inwestycji i wkład
          własny dla poszczególnych formatów?
        search_query_templates:
          - '"{brand}" franczyza koszt inwestycji wkład własny'
          - '"{brand}" franczyza koszt otwarcia inwestycja'
        fields:
          investment.total_low: public_expected
          investment.total_high: public_expected
          investment.currency: public_expected
          investment.own_contribution: public_optional
          investment.as_of: public_optional
        min_sources: 1
        preferred_source_types: [official, legal_document, industry]
        acceptance_criteria: >-
          Zakres, waluta i data dotyczą tego samego formatu. Brak jawnej daty
          ważności nie zeruje kwoty, lecz wymaga zapisania daty pobrania i flagi
          do późniejszego odświeżenia.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity, scope.offer_and_transaction]

      - question_id: fdd11.advertising_it_training
        requirement: required
        title: "Szkolenie startowe"
        question: >-
          Jakie szkolenie dla franczyzobiorcy marka publicznie deklaruje?
        search_query_templates:
          - '"{brand}" franczyza szkolenie franczyzobiorcy'
          - '"{brand}" franczyza wsparcie szkoleniowe'
        fields:
          support.training_program: public_optional
        min_sources: 1
        preferred_source_types: [official, industry]
        acceptance_criteria: >-
          Opis zachowuje autora i zakres deklaracji; materiał marketingowy jest
          oznaczany jako deklaracja marki, nie gwarancja umowna.
        requires_independent_corroboration: false
        max_age_days: 730
        dependencies: [scope.brand_identity]

      - question_id: fdd20.systemwide_outlet_history
        requirement: critical
        title: "Skala sieci w Polsce"
        question: >-
          Ile placówek obejmuje aktualny publiczny snapshot sieci i na jaki dzień
          oraz obszar podano tę liczbę?
        search_query_templates:
          - '"{brand}" liczba placówek Polska rok'
          - '"{brand}" ile lokali placówek w Polsce'
        fields:
          outlets.current_total: public_expected
          outlets.as_of: public_expected
        min_sources: 1
        preferred_source_types: [official, registry, industry]
        acceptance_criteria: >-
          Liczba zachowuje geografię i datę. Globalnej liczby ani wyniku mapy nie
          wolno prezentować jako liczby działających placówek w Polsce.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity]

  - profile_id: "PL:L1:v1"
    aliases: []
    country: "PL"
    level: "L1"
    name: "Polska — podstawowy profil katalogowy"
    description: >-
      Podstawowe, porównywalne dane o ofercie franczyzowej, które przeciętny
      użytkownik może znaleźć na oficjalnej stronie i popularnych portalach.
    intended_use: >-
      Masowe nasycanie katalogu marek świeżymi danymi podstawowymi bez
      sugerowania, że wykonano pełne due diligence.
    access_scope: public
    legacy_depth: due_diligence
    default_availability: public_expected
    country_authoritative_sources:
      - "https://biznes.gov.pl/"
    completion_required_availabilities: [public_expected]
    question_rules:
      - question_id: scope.brand_identity
        requirement: critical
        title: "Publiczny profil marki i oficjalne kanały"
        question: >-
          Jaka marka i oferta franczyzowa są publicznie przedstawiane, jaka jest
          kategoria i krótki opis modelu oraz które strony i ogólne kanały
          biznesowe są oficjalne?
        search_query_templates:
          - '"{brand}" franczyza oficjalna strona {country}'
          - '"{brand}" franczyza oferta kontakt'
        fields:
          brand.name: public_expected
          brand.aliases: public_optional
          brand.category: public_expected
          brand.public_summary: public_expected
          websites.official: public_expected
          websites.franchise_offer: public_expected
          contact.generic_business_route: public_expected
        min_sources: 1
        preferred_source_types: [official, industry, marketplace]
        acceptance_criteria: >-
          Marka, opis i kanały pochodzą z datowanego źródła, a droga kontaktu jest
          ogólnym kanałem biznesowym, nie prywatnymi danymi osoby.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: []

      - question_id: scope.offer_and_transaction
        requirement: critical
        title: "Format oferty i podstawowe wymagania kandydata"
        question: >-
          Jakie formaty i rodzaje współpracy są oferowane oraz jakie publiczne
          wymagania kapitałowe, lokalowe, doświadczenia i zaangażowania dotyczą
          kandydata?
        search_query_templates:
          - '"{brand}" franczyza wymagania kandydat wkład lokal'
          - '"{brand}" franczyza formaty współpracy'
        fields:
          offer.type: public_expected
          offer.unit_formats: public_expected
          offer.new_or_resale: public_optional
          offer.target_investor: public_optional
          candidate.capital_requirement: public_expected
          candidate.experience: public_optional
          candidate.time_commitment: public_optional
          candidate.premises_requirements: public_expected
          candidate.other_requirements: public_optional
        min_sources: 1
        preferred_source_types: [official, industry, marketplace]
        acceptance_criteria: >-
          Różne formaty placówek i transakcji nie są łączone, a każde wymaganie
          zachowuje kontekst konkretnej oferty.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity]

      - question_id: scope.jurisdictions
        requirement: required
        title: "Geografia dostępnej oferty"
        question: >-
          W jakim kraju, regionach i lokalizacjach marka publicznie poszukuje
          franczyzobiorców lub oferuje nowe placówki?
        search_query_templates:
          - '"{brand}" franczyza lokalizacje regiony Polska'
          - '"{brand}" gdzie otworzyć placówkę franczyzową'
        fields:
          jurisdictions.target_country: public_expected
          jurisdictions.target_regions: public_expected
          jurisdictions.offer_locations: public_optional
        min_sources: 1
        preferred_source_types: [official, industry, marketplace]
        acceptance_criteria: >-
          Geografia opisuje dostępność oferty, a nie wywnioskowany zasięg całej
          sieci lub niepotwierdzoną możliwość otwarcia.
        requires_independent_corroboration: false
        max_age_days: 180
        dependencies: [scope.brand_identity, scope.offer_and_transaction]

      - question_id: fdd01.business_background
        requirement: required
        title: "Publiczne podsumowanie modelu i historii"
        question: >-
          Jaki jest model działalności, od kiedy działa marka i franczyza oraz jak
          oficjalnie opisuje swój rynek i historię operacyjną?
        search_query_templates:
          - '"{brand}" historia marki franczyza model biznesowy'
          - '"{brand}" od kiedy franczyza Polska'
        fields:
          business.model: public_expected
          franchisor.operating_history: public_optional
          franchisor.franchising_history: public_expected
          market.summary: public_optional
          brand.founded_year: public_optional
          brand.franchising_since: public_expected
        min_sources: 1
        preferred_source_types: [official, industry, reputable_media]
        acceptance_criteria: >-
          Daty i opis modelu są przypisane do właściwej marki lub podmiotu i nie
          zamieniają deklaracji marketingowej w niezależnie potwierdzony fakt.
        requires_independent_corroboration: false
        max_age_days: 730
        dependencies: [scope.brand_identity]

      - question_id: fdd05.initial_fees
        requirement: critical
        title: "Reklamowana opłata wejściowa"
        question: >-
          Czy oferta publicznie wskazuje opłatę za przystąpienie do sieci i jaka
          jest jej kwota, waluta, podstawa podatkowa oraz data obowiązywania?
        search_query_templates:
          - '"{brand}" franczyza opłata wstępna opłata za przystąpienie'
          - '"{brand}" franczyza opłata wpisowa warunki'
        fields:
          fees.joining_fee: public_expected
          fees.joining_fee_currency: public_expected
          fees.joining_fee_tax_basis: public_optional
          fees.joining_fee_as_of: public_expected
        min_sources: 1
        preferred_source_types: [official, legal_document]
        acceptance_criteria: >-
          Opłata za przystąpienie jest oddzielona od wkładu własnego, pakietu
          startowego i całkowitej inwestycji oraz zachowuje netto/brutto i datę.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity, scope.offer_and_transaction]

      - question_id: fdd06.other_fees
        requirement: required
        title: "Publicznie podawane opłaty bieżące"
        question: >-
          Jakie opłaty royalty, marketingowe lub inne cykliczne są publicznie
          podawane wraz z podstawą naliczenia i częstotliwością?
        search_query_templates:
          - '"{brand}" franczyza opłata miesięczna royalty marketingowa'
          - '"{brand}" franczyza opłaty bieżące'
        fields:
          fees.royalty: public_optional
          fees.marketing: public_optional
          fees.other: public_optional
        min_sources: 1
        preferred_source_types: [official, legal_document]
        acceptance_criteria: >-
          Każda opłata zachowuje kwotę lub formułę, podstawę naliczenia,
          częstotliwość, walutę i kontekst formatu placówki.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity, scope.offer_and_transaction]

      - question_id: fdd07.initial_investment
        requirement: critical
        title: "Reklamowana inwestycja, wkład i pakiet startowy"
        question: >-
          Jaki publicznie deklarowany zakres całkowitej inwestycji, wkład własny
          i pakiet startowy dotyczą poszczególnych formatów placówki?
        search_query_templates:
          - '"{brand}" franczyza koszt inwestycji wkład własny'
          - '"{brand}" franczyza pakiet startowy koszt otwarcia'
        fields:
          investment.total_low: public_expected
          investment.total_high: public_expected
          investment.currency: public_expected
          investment.own_contribution: public_expected
          investment.startup_package: public_optional
          investment.tax_basis: public_optional
          investment.as_of: public_expected
        min_sources: 1
        preferred_source_types: [official, legal_document, industry]
        acceptance_criteria: >-
          Całkowita inwestycja, wkład własny, opłata wejściowa i pakiet startowy
          są oddzielnymi wartościami z walutą, VAT, datą i formatem placówki.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [fdd05.initial_fees, scope.offer_and_transaction]

      - question_id: fdd10.financing
        requirement: recommended
        title: "Publiczna dostępność finansowania"
        question: >-
          Czy marka lub wskazany partner publicznie oferuje albo organizuje
          finansowanie inwestycji?
        search_query_templates:
          - '"{brand}" franczyza finansowanie inwestycji partner'
          - '"{brand}" franczyza kredyt leasing'
        fields:
          financing.available: public_optional
          financing.provider: public_optional
        min_sources: 1
        preferred_source_types: [official, government]
        acceptance_criteria: >-
          Sama wzmianka o finansowaniu nie jest przedstawiana jako zatwierdzona
          oferta kredytu i identyfikuje podmiot, który ją deklaruje.
        requires_independent_corroboration: false
        max_age_days: 180
        dependencies: [fdd07.initial_investment]

      - question_id: fdd11.assistance_and_opening
        requirement: required
        title: "Publicznie deklarowane wsparcie i otwarcie"
        question: >-
          Jakie wsparcie przed otwarciem, przy wyborze lokalu, uruchomieniu i
          bieżącym prowadzeniu placówki marka publicznie deklaruje?
        search_query_templates:
          - '"{brand}" franczyza wsparcie otwarcie lokal'
          - '"{brand}" wsparcie franczyzobiorcy prowadzenie placówki'
        fields:
          support.pre_opening: public_expected
          support.site_selection: public_optional
          support.hiring_and_opening: public_optional
          support.ongoing: public_expected
          support.estimated_opening_time: public_optional
        min_sources: 1
        preferred_source_types: [official, industry]
        acceptance_criteria: >-
          Deklarowane wsparcie jest przypisane do etapu i warunków oferty, bez
          sugerowania zobowiązania umownego, jeśli umowy nie zbadano.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity, scope.offer_and_transaction]

      - question_id: fdd11.advertising_it_training
        requirement: required
        title: "Publiczne szkolenie, reklama i systemy"
        question: >-
          Jak marka opisuje szkolenie, wsparcie reklamowe i podstawowe systemy
          wykorzystywane przez franczyzobiorcę?
        search_query_templates:
          - '"{brand}" franczyza szkolenie reklama system informatyczny'
          - '"{brand}" szkolenie franczyzobiorcy'
        fields:
          support.training_program: public_expected
          support.advertising_program: public_optional
          support.it_systems: public_optional
        min_sources: 1
        preferred_source_types: [official, industry]
        acceptance_criteria: >-
          Zakres szkolenia i systemów zachowuje informację, kto, kiedy i pod jakimi
          warunkami je zapewnia; brak publicznej ceny nie jest zerowym kosztem.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [fdd11.assistance_and_opening]

      - question_id: fdd15.owner_participation
        requirement: required
        title: "Publiczny model zaangażowania właściciela"
        question: >-
          Czy właściciel musi osobiście prowadzić placówkę, czy może ustanowić
          managera i jakie podstawowe kwalifikacje są publicznie wymagane?
        search_query_templates:
          - '"{brand}" franczyza właściciel manager zaangażowanie'
          - '"{brand}" franczyza prowadzenie sklepu wymagania'
        fields:
          operator.owner_participation_required: public_expected
          operator.manager_allowed: public_optional
          operator.manager_qualifications: public_optional
        min_sources: 1
        preferred_source_types: [official, industry]
        acceptance_criteria: >-
          Model właściciel-operator i dopuszczenie managera są przedstawione jako
          publiczna deklaracja, a nie pełna interpretacja umowy.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.offer_and_transaction]

      - question_id: fdd19.fpr_status
        requirement: recommended
        title: "Publiczne deklaracje wyników"
        question: >-
          Czy marka publicznie podaje przychody, zysk, marżę, break-even lub okres
          zwrotu i gdzie dokładnie opublikowano te twierdzenia?
        search_query_templates:
          - '"{brand}" franczyza przychód zysk rentowność'
          - '"{brand}" franczyza okres zwrotu break even'
        fields:
          performance.disclosure_status: public_optional
          performance.claims: public_optional
          performance.claim_locations: public_optional
          performance.unapproved_or_conflicting_claims: public_optional
        min_sources: 1
        preferred_source_types: [official, legal_document, reputable_media]
        acceptance_criteria: >-
          Każda deklaracja wyniku jest dokładnie cytowana i opisana jako twierdzenie
          wskazanego autora, bez dorabiania brakującej metodologii.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity]

      - question_id: fdd20.systemwide_outlet_history
        requirement: critical
        title: "Aktualny obraz sieci"
        question: >-
          Ile placówek działa obecnie, ile jest franczyzowych i własnych oraz jakiego
          kraju lub zakresu geograficznego dotyczy liczba?
        search_query_templates:
          - '"{brand}" liczba placówek Polska franczyzowych'
          - '"{brand}" sieć ile sklepów placówek rok'
        fields:
          outlets.current_total: public_expected
          outlets.current_franchised: public_optional
          outlets.current_company_owned: public_optional
          outlets.snapshot_scope: public_expected
          outlets.as_of: public_expected
        min_sources: 1
        preferred_source_types: [official, registry, industry]
        acceptance_criteria: >-
          Liczba placówek zachowuje datę, geografię i typ własności; globalna liczba
          sieci nie jest przedstawiana jako liczba placówek w Polsce.
        requires_independent_corroboration: false
        max_age_days: 365
        dependencies: [scope.brand_identity]

  - profile_id: "PL:L2:v1"
    aliases: ["PL:L2"]
    country: "PL"
    level: "L2"
    name: "Polska — zweryfikowany profil publiczny"
    description: >-
      Kumulatywny profil wieloźródłowy uzupełniony o rejestry, historię podmiotu,
      publiczne ryzyka, znaki, finanse i bardziej szczegółowe warunki oferty.
    intended_use: >-
      Pogłębianie najważniejszych marek i tworzenie publicznego profilu wyraźnie
      bogatszego oraz lepiej udokumentowanego niż typowy katalog franczyz.
    access_scope: public
    legacy_depth: due_diligence
    inherits: "PL:L1:v1"
    default_availability: public_optional
    country_authoritative_sources:
      - "https://www.gov.pl/web/gov/uzyskaj-informacje-z-krajowego-rejestru-sadowego"
      - "https://prs.ms.gov.pl/"
      - "https://www.gov.pl/web/sprawiedliwosc/przegladarka-dokumentow-finansowych"
      - "https://decyzje.uokik.gov.pl/"
      - "https://uprp.gov.pl/pl/uslugi-online/e-wyszukiwarka"
    completion_required_availabilities:
      - public_expected
      - registry_expected
      - manual_research_required
    question_rules:
      - question_id: scope.brand_identity
        include_all_catalog_fields: true
        default_availability: registry_expected
        search_query_templates:
          - '"{brand}" oficjalna strona franczyza {country}'
          - '"{legal_name}" KRS rejestr przedsiębiorców'
        min_sources: 2
        preferred_source_types: [registry, official, government]
        acceptance_criteria: >-
