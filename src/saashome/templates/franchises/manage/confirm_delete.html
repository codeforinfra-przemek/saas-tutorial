{% extends "base.html" %}

{% block title %}{{ block.super }} | Usuń franczyzę{% endblock %}

{% block content %}
    <section class="mx-auto w-full max-w-3xl px-5 py-8 sm:px-8 lg:px-10">
        <div class="rounded-lg border border-red-200 bg-white p-6 shadow-sm">
            <span class="inline-flex rounded-full bg-red-50 px-3 py-1 text-xs font-extrabold uppercase tracking-wide text-red-700">Potwierdzenie</span>
            <h1 class="mt-4 text-3xl font-black tracking-normal text-slate-950">Usunąć franczyzę?</h1>
            <p class="mt-2 text-sm leading-6 text-slate-600">
                Usuwasz <strong>{{ franchise.name }}</strong>. To usunie też lokalizacje i powiązane leady tej franczyzy.
            </p>
            <form method="post" class="mt-6 flex flex-wrap items-center justify-between gap-3 border-t border-slate-100 pt-5">
                {% csrf_token %}
                <a href="{% url 'franchises:manage_detail' franchise.pk %}" class="inline-flex min-h-10 items-center justify-center rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100">Anuluj</a>
                <button type="submit" class="inline-flex min-h-10 items-center justify-center rounded-lg bg-red-600 px-5 py-2 text-sm font-extrabold text-white hover:bg-red-700">
                    Usuń franczyzę
                </button>
            </form>
        </div>
    </section>
{% endblock %}
