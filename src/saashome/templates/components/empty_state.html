<div class="rounded-lg border border-dashed border-slate-300 bg-white px-5 py-8 text-center">
    <h2 class="text-lg font-black text-slate-950">{{ title }}</h2>
    {% if description %}<p class="mx-auto mt-2 max-w-xl text-sm leading-6 text-slate-600">{{ description }}</p>{% endif %}
    {% if cta_label and cta_url %}<div class="mt-5">{% include "components/button.html" with href=cta_url label=cta_label variant="primary" size="small" only %}</div>{% endif %}
</div>
