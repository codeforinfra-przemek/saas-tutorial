{% extends "backoffice/base_internal.html" %}
{% block internal_content %}<header><p class="text-xs font-extrabold uppercase tracking-wide text-brand-700">Revenue operations</p><h2 class="mt-2 text-3xl font-black">Subskrypcje organizacji</h2></header><form method="get" class="mt-6 grid gap-3 rounded-lg border border-slate-200 bg-white p-4 md:grid-cols-5"><select name="status" class="rounded-lg border-slate-200 text-sm"><option value="">Wszystkie statusy</option>{% for value,label in status_choices %}<option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select><select name="plan" class="rounded-lg border-slate-200 text-sm"><option value="">Wszystkie plany</option>{% for plan in plans %}<option value="{{ plan.id }}" {% if filters.plan == plan.id|stringformat:"s" %}selected{% endif %}>{{ plan.name }}</option>{% endfor %}</select><select name="billing_interval" class="rounded-lg border-slate-200 text-sm"><option value="">Wszystkie interwały</option><option value="monthly" {% if filters.billing_interval == "monthly" %}selected{% endif %}>Monthly</option><option value="yearly" {% if filters.billing_interval == "yearly" %}selected{% endif %}>Yearly</option><option value="manual" {% if filters.billing_interval == "manual" %}selected{% endif %}>Manual</option><option value="custom" {% if filters.billing_interval == "custom" %}selected{% endif %}>Custom</option></select><label class="flex items-center gap-2 text-sm font-bold"><input type="checkbox" name="cancelled" value="true" {% if filters.cancelled == "true" %}checked{% endif %}> Tylko anulowane</label><button class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-extrabold text-white">Filtruj</button></form><section class="mt-5 rounded-lg border border-slate-200 bg-white p-3">{% include "backoffice/partials/subscription_table.html" %}</section>{% endblock %}
