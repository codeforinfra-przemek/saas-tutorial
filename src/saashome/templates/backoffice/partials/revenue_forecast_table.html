{% load franchise_formatters %}
<div class="table-scroll overflow-x-auto"><table class="min-w-full text-left text-sm"><thead class="border-b border-slate-200 text-xs uppercase text-slate-500"><tr><th class="px-3 py-3">Miesiąc</th><th class="px-3 py-3">Oczekiwany MRR</th><th class="px-3 py-3">Odnowienia gotówkowe</th><th class="px-3 py-3">Kończące się subskrypcje</th></tr></thead><tbody>{% for row in forecast_rows %}<tr class="border-b border-slate-100"><td class="px-3 py-3 font-bold">{{ row.month|date:"Y-m" }}</td><td class="px-3 py-3">{{ row.expected_mrr|grouped_number:2 }} zł</td><td class="px-3 py-3">{{ row.expected_cash_renewals|grouped_number:2 }} zł</td><td class="px-3 py-3">{{ row.subscriptions_ending_count }}</td></tr>{% endfor %}</tbody></table></div>
