<a href="{{ franchise.get_absolute_url }}" class="block rounded-lg border border-slate-200 bg-white p-4 transition hover:border-brand-200 hover:shadow-md">
    <div class="flex items-start gap-3">
        <div class="grid h-11 w-11 shrink-0 place-items-center rounded-lg border border-slate-200 bg-slate-50">
            <span class="font-black text-brand-700">{{ franchise.name|first }}</span>
        </div>
        <div>
            <h3 class="font-black text-slate-950">{{ franchise.name }}</h3>
            <p class="mt-1 text-xs font-semibold text-slate-500">{{ franchise.category.name }}</p>
        </div>
    </div>
    <p class="mt-3 text-sm leading-6 text-slate-600">{{ franchise.short_description }}</p>
    <p class="mt-3 text-xs font-bold text-slate-500">
        {% if franchise.min_investment %}od {{ franchise.min_investment|floatformat:0 }} zł{% else %}inwestycja: b/d{% endif %}
    </p>
</a>
