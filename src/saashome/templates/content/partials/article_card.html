<a href="{{ article.get_absolute_url }}" class="block rounded-lg border border-slate-200 bg-white p-5 shadow-sm transition hover:border-brand-200 hover:shadow-md">
    {% if article.category %}
        <p class="text-xs font-extrabold uppercase tracking-wide text-brand-700">{{ article.category.name }}</p>
    {% endif %}
    <h2 class="mt-2 text-xl font-black tracking-normal text-slate-950">{{ article.title }}</h2>
    <p class="mt-3 text-sm leading-6 text-slate-600">{{ article.excerpt|default:article.body|truncatewords:28 }}</p>
    <p class="mt-4 text-xs font-bold text-slate-400">{{ article.published_at|date:"Y-m-d" }}</p>
</a>
