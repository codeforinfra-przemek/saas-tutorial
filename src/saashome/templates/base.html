<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_name|default:"SaaS Home" }}{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #172033;
            --muted: #647086;
            --line: #dfe5ee;
            --paper: #f7f9fc;
            --accent: #19a974;
            --accent-dark: #117a55;
            --panel: #ffffff;
            --map: #dde8df;
            --pin: #e64b3c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--ink);
            background: var(--paper);
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 22px clamp(18px, 5vw, 72px);
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--ink);
            font-weight: 800;
            font-size: 20px;
            text-decoration: none;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            background: var(--accent);
            color: white;
            font-weight: 900;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 18px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }

        .nav-links a {
            color: inherit;
            text-decoration: none;
        }

        .nav-links a[aria-current="page"] {
            color: var(--accent-dark);
        }

        .hero {
            width: min(1180px, calc(100% - 36px));
            margin: 52px auto 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.92fr);
            gap: clamp(28px, 6vw, 72px);
            align-items: center;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: white;
            color: var(--accent-dark);
            font-size: 13px;
            font-weight: 800;
        }

        h1 {
            max-width: 780px;
            margin: 18px 0;
            font-size: clamp(42px, 7vw, 78px);
            line-height: 0.98;
            letter-spacing: 0;
        }

        .lead {
            max-width: 620px;
            margin: 0 0 28px;
            color: var(--muted);
            font-size: clamp(17px, 2.2vw, 21px);
            line-height: 1.55;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .button {
            min-height: 46px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid var(--line);
            color: var(--ink);
            background: white;
            text-decoration: none;
            font-weight: 800;
        }

        .button.primary {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        .preview {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(23, 32, 51, 0.12);
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            border-bottom: 1px solid var(--line);
        }

        .search {
            width: 62%;
            height: 34px;
            border-radius: 7px;
            background: #eef3f8;
        }

        .toggle {
            width: 82px;
            height: 34px;
            border-radius: 7px;
            background: #172033;
        }

        .preview-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 360px;
        }

        .list {
            padding: 14px;
            border-right: 1px solid var(--line);
            display: grid;
            gap: 12px;
            align-content: start;
        }

        .object-card {
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
        }

        .object-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .object-card span {
            display: block;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.35;
        }

        .map {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(36deg, transparent 0 44%, rgba(255, 255, 255, 0.6) 44% 46%, transparent 46%),
                linear-gradient(132deg, transparent 0 52%, rgba(255, 255, 255, 0.55) 52% 54%, transparent 54%),
                var(--map);
        }

        .district {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.78);
            border-radius: 38% 62% 52% 48%;
            background: rgba(25, 169, 116, 0.13);
        }

        .district.one {
            width: 170px;
            height: 120px;
            left: 24px;
            top: 42px;
        }

        .district.two {
            width: 150px;
            height: 150px;
            right: 18px;
            bottom: 42px;
        }

        .pin {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50% 50% 50% 0;
            background: var(--pin);
            transform: rotate(-45deg);
            box-shadow: 0 8px 18px rgba(230, 75, 60, 0.35);
        }

        .pin::after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            left: 6px;
            top: 6px;
        }

        .pin.a {
            left: 35%;
            top: 26%;
        }

        .pin.b {
            left: 64%;
            top: 44%;
        }

        .pin.c {
            left: 49%;
            top: 67%;
        }

        .stats {
            width: min(1180px, calc(100% - 36px));
            margin: 10px auto 54px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .stat {
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: white;
        }

        .stat strong {
            display: block;
            margin-bottom: 4px;
            font-size: 28px;
        }

        .stat span {
            color: var(--muted);
            font-weight: 600;
        }

        .content-section {
            width: min(1180px, calc(100% - 36px));
            margin: 42px auto 56px;
        }

        .section-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
        }

        .section-header h1 {
            margin: 0;
            font-size: clamp(34px, 5vw, 54px);
        }

        .section-header p {
            max-width: 560px;
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 920px;
            font-size: 14px;
        }

        .data-table th,
        .data-table td {
            padding: 13px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        .data-table th {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .data-table tr:last-child td {
            border-bottom: 0;
        }

        .muted {
            color: var(--muted);
        }

        .nowrap {
            white-space: nowrap;
        }

        .truncate {
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 820px) {
            .nav {
                align-items: flex-start;
                flex-direction: column;
            }

            .hero {
                margin-top: 34px;
                grid-template-columns: 1fr;
            }

            .preview-body,
            .stats {
                grid-template-columns: 1fr;
            }

            .list {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .map {
                min-height: 260px;
            }

            .section-header {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <main class="page">
        {% include "includes/nav.html" %}

        {% block content %}
        {% endblock %}
    </main>

    {% block extra_body %}
    {% endblock %}
</body>
</html>
