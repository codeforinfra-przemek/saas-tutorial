{% if breadcrumbs %}<nav aria-label="Breadcrumb" class="mb-5 text-xs font-semibold text-slate-500"><ol class="flex flex-wrap items-center gap-x-2 gap-y-1">{% for item in breadcrumbs %}<li class="flex items-center gap-2">{% if not forloop.last and item.url %}<a href="{{ item.url }}" class="hover:text-brand-700 hover:underline">{{ item.name }}</a>{% else %}<span aria-current="page" class="text-slate-700">{{ item.name }}</span>{% endif %}{% if not forloop.last %}<span aria-hidden="true">/</span>{% endif %}</li>{% endfor %}</ol></nav>{% endif %}
