{% extends "base.html" %}

{% block title %}{{ block.super }} | Email wysłany{% endblock %}

{% block content %}
    <section class="mx-auto grid min-h-[calc(100vh-72px)] w-full max-w-7xl place-items-center px-5 py-10 sm:px-8 lg:px-10">
        <div class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 text-center shadow-sm">
            <h1 class="text-3xl font-black tracking-normal text-slate-950">Sprawdź skrzynkę</h1>
            <p class="mt-3 text-sm leading-6 text-slate-600">Jeśli konto istnieje, wysłaliśmy wiadomość z linkiem do resetu hasła.</p>
            <a href="{% url 'account_login' %}" class="mt-6 inline-flex min-h-11 items-center justify-center rounded-lg border border-slate-200 bg-white px-5 py-3 text-sm font-bold text-slate-700 hover:bg-slate-100">Wróć do logowania</a>
        </div>
    </section>
{% endblock %}
