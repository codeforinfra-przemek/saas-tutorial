<section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
    <h2 class="text-lg font-black text-slate-950">Traffic sources</h2>
    <div class="mt-4 space-y-3">
        {% for row in analytics.traffic_sources %}
            <div class="flex items-center justify-between gap-3 border-b border-slate-100 pb-3 last:border-b-0 last:pb-0">
                <span class="text-sm font-semibold text-slate-700">{{ row.source }}</span>
                <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-black text-slate-700">{{ row.count }}</span>
            </div>
        {% empty %}
            <p class="text-sm text-slate-500">No traffic source data in this range.</p>
        {% endfor %}
    </div>
</section>
