{% load socialaccount %}
{% get_providers as socialaccount_providers %}
{% if socialaccount_providers %}
    <div class="mt-5 space-y-2">
        {% for provider in socialaccount_providers %}
            {% provider_login_url provider process=process scope=scope auth_params=auth_params as href %}
            <form method="post" action="{{ href }}">
                {% csrf_token %}
                <button type="submit" class="inline-flex min-h-11 w-full items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-5 py-3 text-sm font-extrabold text-slate-800 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-100">
                    {% if provider.id == "github" %}
                        <span aria-hidden="true" class="grid h-5 w-5 place-items-center rounded-full bg-slate-950 text-xs font-black text-white">GH</span>
                        Kontynuuj przez GitHub
                    {% else %}
                        Kontynuuj przez {{ provider.name }}
                    {% endif %}
                </button>
            </form>
        {% endfor %}
    </div>
{% endif %}
